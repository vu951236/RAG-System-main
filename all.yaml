apiVersion: v1
kind: Namespace
metadata:
  name: rag
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-env
  namespace: rag
data:
  QDRANT_URL: http://qdrant:6333
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: rag
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
    spec:
      containers:
        - name: rag-backend
          image: vu951236/rag-backend:latest
          envFrom:
            - configMapRef:
                name: rag-env
            - secretRef:
                name: rag-secret
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: rag-backend
  namespace: rag
spec:
  type: NodePort
  selector:
    app: rag-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ai
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-ai
  template:
    metadata:
      labels:
        app: rag-ai
    spec:
      containers:
        - name: rag-ai
          image: vu951236/rag-ai:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: rag-ai
  namespace: rag
spec:
  selector:
    app: rag-ai
  ports:
    - port: 8000
      targetPort: 8000